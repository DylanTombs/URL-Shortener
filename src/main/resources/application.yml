spring:
  application:
    name: url-shortener

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/urlshortener}
    username: ${DB_USERNAME:urlshortener}
    password: ${DB_PASSWORD:secret}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
    replica:
      url: ${DB_REPLICA_URL:${spring.datasource.url}}
      username: ${DB_REPLICA_USERNAME:${spring.datasource.username}}
      password: ${DB_REPLICA_PASSWORD:${spring.datasource.password}}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  cache:
    type: redis

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: true
    db:
      enabled: true
  cloudwatch:
    metrics:
      export:
        namespace: UrlShortener
        step: 60s
        enabled: ${CLOUDWATCH_METRICS_ENABLED:false}
  metrics:
    distribution:
      percentiles:
        url.redirect: 0.5,0.95,0.99
      percentiles-histogram:
        url.redirect: false

logging:
  level:
    root: INFO
    com.urlshortener: DEBUG

app:
  base-url: ${APP_BASE_URL:https://sho.rt}
