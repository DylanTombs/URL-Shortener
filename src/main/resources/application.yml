server:
  # Graceful shutdown: on SIGTERM, stop accepting new requests and wait up to 30s
  # for in-flight requests to complete before the JVM exits. This ensures a redirect
  # that reached resolveUrl() also completes incrementClickCount() before the task
  # is deregistered by ECS. ALB deregistration delay (30s) is configured to match.
  shutdown: graceful
  tomcat:
    # Reject oversized request bodies before Spring parses them.
    # 2048-char URL + JSON overhead fits comfortably within 8KB.
    max-http-post-size: 8192

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s

  application:
    name: url-shortener

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/urlshortener}
    username: ${DB_USERNAME:urlshortener}
    password: ${DB_PASSWORD:secret}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
    replica:
      url: ${DB_REPLICA_URL:${spring.datasource.url}}
      username: ${DB_REPLICA_USERNAME:${spring.datasource.username}}
      password: ${DB_REPLICA_PASSWORD:${spring.datasource.password}}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        query:
          # 5-second query timeout. Typical redirect DB query: <5ms.
          # Prevents a single lock-contention or runaway query from holding a HikariCP
          # thread indefinitely and exhausting the connection pool across all ECS tasks.
          timeout: 5000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  cache:
    type: redis

management:
  endpoints:
    web:
      exposure:
        # prometheus excluded — no scraper configured; CloudWatch is the metrics backend.
        # Add it back (with authentication) if Prometheus/Grafana is introduced.
        include: health,info,metrics
  endpoint:
    health:
      # when_authorized: full detail only to authenticated callers.
      # Prevents exposing pool state, Redis/DB connection info to unauthenticated requests.
      # Override to 'always' in application-dev.yml for local debugging.
      show-details: when_authorized
      # Expose separate liveness and readiness probes.
      # /actuator/health/liveness  — ECS container health check (restart if DOWN)
      # /actuator/health/readiness — ALB target group health check (deregister if DOWN)
      # Liveness answers "is the JVM alive?"; readiness answers "can this task serve traffic?"
      # A Redis/DB failure makes the task not-ready (remove from ALB) without triggering
      # an unnecessary container restart.
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
    redis:
      enabled: true
    db:
      enabled: true
  cloudwatch:
    metrics:
      export:
        namespace: UrlShortener
        step: 60s
        enabled: ${CLOUDWATCH_METRICS_ENABLED:false}
  metrics:
    distribution:
      percentiles:
        url.redirect: 0.5,0.95,0.99
      percentiles-histogram:
        url.redirect: false

logging:
  level:
    root: INFO
    com.urlshortener: DEBUG

app:
  base-url: ${APP_BASE_URL:https://sho.rt}
