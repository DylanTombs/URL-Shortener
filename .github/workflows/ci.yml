name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Runs on every push and every PR. Docker is pre-installed on ubuntu-latest
  # so Testcontainers auto-detects /var/run/docker.sock without any extra config.
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Run tests with coverage
        run: mvn verify

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7
